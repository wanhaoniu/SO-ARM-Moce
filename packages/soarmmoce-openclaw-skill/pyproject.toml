[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "soarmmoce-openclaw-skill"
version = "0.1.0"
description = "OpenClaw tool-call adapter for soarmmoce-sdk Robot API"
readme = "README.md"
requires-python = ">=3.8"
authors = [{name = "SoarmMoce"}]
license = "MIT"
keywords = ["openclaw", "robot", "soarmmoce", "tool-calling"]
dependencies = [
  "soarmmoce-sdk>=0.1.0",
]

[project.optional-dependencies]
dev = ["build", "pytest"]

[project.scripts]
soarmmoce-skill = "soarmmoce_openclaw_skill.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
